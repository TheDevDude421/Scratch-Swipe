<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating - Scratch Swipe</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" integrity="..." crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="topbar-container">
                <div class="topbar-header-container">
                    <p class="topbar-header">Leaderboard</p>
                    <div style="display: flex; gap: 7.5px;">
                        <button class="circular-btn" id="leaderboard-filter-btn"><i class="fa-solid fa-sliders"></i></button>
                        <button class="circular-btn" id="settings-btn"><i class="fa-solid fa-gear icon"></i></button>
                    </div>
                </div>
                <div class="topbar-input-container">
                    <div class="searchbar">
                        <i class="fa-solid fa-magnifying-glass icon"></i>
                        <input id="leaderboard-search-input" class="search-input" autocomplete="off" placeholder="Find user rank...">
                    </div>
                </div>
            </div>
        </div>
        <div class="leaderboard-content">
            <div class="tab-container">
                <div class="tab selected" id="tab-followed">Most Followed</div>
                <div class="tab" id="tab-following">Most Following</div>
            </div>
            <div class="leaderboard-results"></div>
        </div>
    </div>
    <!-- Application Scripts -->
    <script src="js/image-fallback.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/presets.js"></script>
    <script src="js/database.js"></script>
    <script src="js/details.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/discover.js"></script>
    <script src="js/search.js"></script>
    <script src="js/leaderboard.js"></script>
    <script src="js/liked.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
